server {
    listen 80;
    server_name yourdomain.com api.yourdomain.com; # Replace with your domain or IP

    client_max_body_size 50M;

    # Static files handling (if served via Nginx)
    location /static/ {
        alias /home/ubuntu/apexlifesaver/Backend/staticfiles/;
    }

    # Media files handling
    location /media/ {
        alias /home/ubuntu/apexlifesaver/Backend/media/;
    }

    # Proxy to Django Daphne (ASGI HTTP & WebSockets)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket support headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for WebSockets / Long polling
        proxy_read_timeout 86400;
        proxy_connect_timeout 86400;
        proxy_send_timeout 86400;
    }
}
