services:

  # 🗄️ POSTGRES DB
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blood_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 200M

  # ⚡ REDIS
  redis:
    image: redis:7
    container_name: redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  # 🌐 DJANGO APP
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_app
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 250M

  # 🔥 CELERY WORKER
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_worker
    restart: always
    command: celery -A core worker -l info --concurrency=1 --max-tasks-per-child=50
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 150M

  # ⏱️ CELERY BEAT
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery_beat
    restart: always
    command: celery -A core beat -l info
    depends_on:
      - db
      - redis
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
